- id: svbasic_02_001
  section: '2.2'
  section_title: 데이터 타입 개요
  question: SystemVerilog에서 새롭게 도입된 2-state 타입이 가질 수 있는 값은?
  choices:
  - 0, 1, Z
  - 0, 1
  - 0, 1, X, Z
  - 0, 1, X
  answer: 2
  difficulty: 하
  has_code: false
  has_image: false
  explanation:
  - SystemVerilog의 데이터 타입은 표현 가능한 값의 수에 따라 2-state와 4-state로 나뉜다.
  - 2-state 타입(bit, byte, shortint, int, longint)은 0과 1만 표현할 수 있어 시뮬레이션 속도가 빠르지만,
    초기화되지 않은 상태나 고임피던스를 표현할 수 없다.
  - 반면 4-state 타입(logic, reg, integer, time)은 0, 1, X(unknown), Z(high-impedance)
    네 가지 값을 모두 표현 가능하여 하드웨어의 실제 동작을 더 정확히 모델링할 수 있다.
  created: '2026-03-01'
- id: svbasic_02_002
  section: '2.2'
  section_title: 데이터 타입 개요
  question: Variable과 Net의 역할을 올바르게 설명한 것은?
  choices:
  - Variable은 연결을, Net은 값 저장을 담당
  - Variable은 값 저장을, Net은 연결을 모델링
  - 둘 다 값 저장을 담당
  - 둘 다 연결을 모델링
  answer: 2
  difficulty: 하
  has_code: false
  explanation:
  - SystemVerilog의 데이터 객체는 크게 Variable과 Net으로 나뉘며, 각각의 역할이 명확히 구분된다.
  - Variable(logic, reg, bit, int 등)은 프로시저 블록이나 continuous assignment에서 값을 저장하는 역할을
    한다.
  - Net(wire, wand, wor, tri 등)은 하드웨어 모듈 간의 물리적 연결을 모델링하며, 드라이버가 없으면 Z(high-impedance)가
    된다.
  created: '2026-03-01'
- id: svbasic_02_003
  section: '2.3'
  section_title: logic 데이터 타입
  question: SystemVerilog에서 logic 타입이 도입된 주된 이유는?
  choices:
  - 시뮬레이션 속도 향상을 위해
  - reg와 wire의 혼동을 해결하기 위해
  - 2-state 값만 표현하기 위해
  - 메모리 사용량 감소를 위해
  answer: 2
  difficulty: 하
  has_code: false
  explanation:
  - Verilog의 reg는 이름 때문에 하드웨어 register로 오해되기 쉬웠으나, 실제로는 procedural block에서 값을 저장하는
    변수일 뿐이었다.
  - wire와 reg의 구분은 초보 설계자에게 혼동을 야기했고, 모듈 경계를 넘을 때 타입 변환이 필요한 불편함이 있었다.
  - SystemVerilog의 logic은 이 두 타입을 통합하여 단일 드라이버 조건 하에서 variable과 net 역할을 모두 수행할 수 있게
    해결했다.
  created: '2026-03-01'
- id: svbasic_02_004
  section: '2.3'
  section_title: logic 데이터 타입
  question: 다음 선언에서 var 키워드의 의미는? `var logic clk;`
  choices:
  - variable(변수) 선언임을 명시
  - 가변 크기 선언
  - virtual 타입 선언
  - 검증 전용 선언
  answer: 1
  difficulty: 중
  has_code: false
  explanation:
  - var 키워드는 해당 선언이 variable(변수)임을 명시적으로 나타내는 접두어이다.
  - logic 타입은 문맥에 따라 variable 또는 net으로 해석될 수 있는데, var를 붙이면 반드시 variable로 선언된다.
  - 실무에서는 var를 생략하는 경우가 대부분이며, 포트 선언이 아닌 모듈 내부 선언에서 logic은 기본적으로 variable로 취급된다.
  created: '2026-03-01'
- id: svbasic_02_005
  section: '2.4'
  section_title: 2상태 타입과 4상태 타입
  question: 4-state 변수(logic)의 시뮬레이션 초기값은?
  choices:
  - '0'
  - '1'
  - Z
  - X
  answer: 4
  difficulty: 하
  has_code: false
  has_image: true
  image:
    path: "./images/class02_2_5_init.drawio.svg"
    w: 400
    layout: side
  image_alt: "bit(2-state)은 0으로, logic(4-state)은 X로 초기화되는 비교 다이어그램"
  explanation:
  - 4-state 변수(logic, reg, integer 등)는 시뮬레이션 시작 시 X(unknown)로 자동 초기화된다.
  - 이는 설계자가 초기화되지 않은 신호를 시뮬레이션 파형에서 쉽게 식별할 수 있도록 하기 위함이다.
  - 반면 2-state 변수(bit, int 등)는 0으로 초기화되므로, 미초기화 버그를 발견하기 어려울 수 있다.
  created: '2026-03-01'
- id: svbasic_02_006
  section: '2.4'
  section_title: 2상태 타입과 4상태 타입
  question: 2-state 변수(bit)에 4-state 값(X 또는 Z)을 할당하면 어떻게 되는가?
  choices:
  - 컴파일 에러 발생
  - 0으로 변환됨
  - X로 유지됨
  - Z로 유지됨
  answer: 2
  difficulty: 중
  has_code: false
  explanation:
  - 2-state 변수는 0과 1만 표현 가능하므로, X나 Z 값이 할당되면 자동으로 0으로 변환된다.
  - 이 변환은 컴파일 에러나 경고 없이 묵시적으로 발생하므로 주의가 필요하다.
  - 검증 환경에서 2-state 타입을 사용할 때는 4-state 신호와의 인터페이스에서 X/Z 정보가 손실될 수 있음을 고려해야 한다.
  created: '2026-03-01'
- id: svbasic_02_007
  section: '2.5'
  section_title: Verilog 데이터 타입 규칙
  question: Verilog에서 procedural block(always/initial) 안에서만 값을 할당할 수 있는 타입은?
  choices:
  - wire
  - reg
  - tri
  - wand
  answer: 2
  difficulty: 하
  has_code: false
  explanation:
  - Verilog에서 reg 타입은 procedural block(always, initial) 내에서만 값을 할당할 수 있는 variable
    타입이다.
  - wire, tri, wand는 모두 net 타입으로, assign 문이나 모듈 인스턴스의 출력으로만 드라이브할 수 있다.
  - 이 엄격한 구분 때문에 Verilog에서는 모듈 출력 포트가 always 블록에서 구동되면 반드시 reg로 선언해야 했다.
  created: '2026-03-01'
- id: svbasic_02_008
  section: '2.5'
  section_title: Verilog 데이터 타입 규칙
  question: Verilog에서 하위 모듈의 출력 포트를 받는 신호는 어떤 타입으로 선언해야 하는가?
  choices:
  - reg
  - logic
  - wire (net)
  - integer
  answer: 3
  difficulty: 중
  has_code: false
  explanation:
  - Verilog에서 하위 모듈 인스턴스의 출력에 연결되는 신호는 반드시 net 타입(wire)으로 선언해야 한다.
  - 모듈 출력은 continuous driver로 동작하므로, 이를 받는 쪽도 net이어야 드라이버-리시버 관계가 성립한다.
  - 만약 reg로 선언하면 컴파일 에러가 발생하며, 이는 SystemVerilog의 logic 타입 도입으로 해결된 대표적인 불편함이었다.
  created: '2026-03-01'
- id: svbasic_02_009
  section: '2.6'
  section_title: datatype 룰의 완화
  question: SystemVerilog에서 logic 변수에 값을 할당할 수 없는 방법은?
  choices:
  - procedural block (always/initial)
  - 단일 assign 문
  - 다중 모듈 출력 연결
  - 단일 모듈 출력 연결
  answer: 3
  difficulty: 중
  has_code: false
  has_image: true
  image:
    path: "./images/class02_2_7.drawio.svg"
    w: 500
    layout: side
  image_alt: "Verilog wire/reg 구분 vs SystemVerilog logic 통합 비교 다이어그램"
  explanation:
  - logic 변수는 단일 드라이버(single driver)만 허용하는 것이 핵심 제약 조건이다.
  - procedural block, 단일 assign 문, 단일 모듈 출력 연결은 모두 단일 드라이버이므로 허용된다.
  - 그러나 두 개 이상의 모듈 출력을 같은 logic 변수에 동시에 연결하면 다중 드라이버가 되어 컴파일 에러가 발생한다.
  created: '2026-03-01'
- id: svbasic_02_010
  section: '2.6'
  section_title: datatype 룰의 완화
  question: SystemVerilog에서 모듈의 input/output 포트를 선언할 때 가장 권장되는 방식은?
  choices:
  - 기존처럼 wire/reg를 구분하여 선언
  - 모두 bit 타입으로 선언
  - 모두 logic 타입으로 통일하여 선언
  - 모두 wire 타입으로 선언
  answer: 3
  difficulty: 하
  has_code: false
  explanation:
  - SystemVerilog에서는 wire/reg 구분 없이 logic 타입으로 모든 포트를 통일 선언하는 것이 권장된다.
  - 이렇게 하면 모듈 내부 구현이 변경되어도(always 블록 ↔ assign 문) 포트 타입을 수정할 필요가 없다.
  - 코드가 간결해지고 타입 불일치로 인한 컴파일 에러를 사전에 방지할 수 있다.
  created: '2026-03-01'
- id: svbasic_02_011
  section: '2.7'
  section_title: Verilog datatype 예제
  question: Verilog에서 always 블록으로 구동되는 모듈 출력 포트의 타입은?
  choices:
  - wire
  - logic
  - reg
  - bit
  answer: 3
  difficulty: 하
  has_code: false
  explanation:
  - Verilog에서 procedural block(always, initial)으로 값이 할당되는 출력 포트는 반드시 reg 타입으로 선언해야
    한다.
  - 이는 Verilog의 엄격한 데이터 타입 규칙 때문이며, wire 타입 출력은 assign 문이나 모듈 인스턴스로만 드라이브 가능하다.
  - SystemVerilog에서는 logic 타입으로 통일하여 이 제약이 해소되었다.
  created: '2026-03-01'
- id: svbasic_02_012
  section: '2.7'
  section_title: Verilog datatype 예제
  question: 다음 Verilog 코드에서 and_out의 타입이 wire인 이유는?
  choices:
  - 모듈 입력이므로
  - 하위 모듈의 출력을 받으므로
  - assign 문으로 드라이브되므로
  - initial 블록에서 사용되므로
  answer: 2
  difficulty: 중
  has_code: true
  code: 'wire and_out;

    ablock u1(.y(and_out), .a(a_in), .b(b_in));'
  explanation:
  - and_out은 하위 모듈 u1의 출력 포트 y에 연결된 신호이다.
  - Verilog에서 모듈 인스턴스의 출력을 받는 신호는 continuous driver에 의해 구동되므로 반드시 wire(net) 타입으로 선언해야
    한다.
  - 만약 reg로 선언하면 "output port connection is not a net" 컴파일 에러가 발생한다.
  created: '2026-03-01'
- id: svbasic_02_013
  section: '2.8'
  section_title: 완화된 datatype 예제
  question: SystemVerilog에서 다음 코드가 가능한 이유는?
  choices:
  - logic은 net 타입이므로
  - 단일 드라이버 규칙이 충족되므로
  - Verilog에서도 가능한 코드이므로
  - 모듈 출력에는 아무 타입이나 연결 가능하므로
  answer: 2
  difficulty: 중
  has_code: true
  code: 'logic and_out;

    ablock u1(.y(and_out), .a(a_in), .b(b_in));'
  explanation:
  - SystemVerilog에서 logic 변수는 단일 드라이버가 있으면 모듈 출력에도 연결 가능하다.
  - 이 코드에서 u1의 출력 y 하나만 and_out을 구동하므로 단일 드라이버 조건이 충족된다.
  - Verilog에서는 불가능했던 이 패턴이 SystemVerilog에서 허용되면서, wire/reg 구분 없이 logic으로 통일할 수 있게
    되었다.
  created: '2026-03-01'
- id: svbasic_02_014
  section: '2.8'
  section_title: 완화된 datatype 예제
  question: SystemVerilog에서 logic 타입을 사용한 가장 큰 장점은?
  choices:
  - 시뮬레이션 속도가 빨라짐
  - 모듈 경계를 넘어도 타입 변환이 불필요함
  - Z 값을 표현할 수 없음
  - 자동으로 0으로 초기화됨
  answer: 2
  difficulty: 하
  has_code: false
  explanation:
  - logic 타입으로 통일하면 모듈 경계를 넘을 때 Verilog처럼 reg ↔ wire 간 타입 변환이 필요 없다.
  - '모듈 내부 구현을 변경해도(예: assign → always_comb) 포트 선언을 수정하지 않아도 되어 유지보수가 편리하다.'
  - logic은 4-state 타입이므로 X와 Z를 모두 표현 가능하며, 시뮬레이션 초기값은 X이다.
  created: '2026-03-01'
- id: svbasic_02_015
  section: '2.9'
  section_title: variable 할당 제약
  question: logic 변수에 두 개의 모듈 출력을 동시에 연결하면?
  choices:
  - 정상 동작함
  - 시뮬레이션 경고만 발생
  - 컴파일 에러 발생
  - Z 값이 출력됨
  answer: 3
  difficulty: 중
  has_code: false
  has_image: true
  image:
    path: "./images/class02_2_10.drawio.svg"
    w: 800
    layout: side
  image_alt: "단일 드라이버 vs 다중 드라이버 연결 비교 다이어그램"
  explanation:
  - logic 변수는 단일 드라이버만 허용하므로, 두 개의 모듈 출력을 동시에 연결하면 다중 드라이버 에러가 발생한다.
  - 이는 경고가 아닌 컴파일 에러로 처리되어, 시뮬레이션 실행 전에 문제를 발견할 수 있다.
  - 다중 드라이버가 필요한 경우(tri-state bus 등)에는 wire(net) 타입을 사용해야 한다.
  created: '2026-03-01'
- id: svbasic_02_016
  section: '2.9'
  section_title: variable 할당 제약
  question: '다중 드라이버가 필요한 신호(예: tri-state bus)에는 어떤 타입을 사용해야 하는가?'
  choices:
  - logic
  - bit
  - reg
  - wire (net)
  answer: 4
  difficulty: 중
  has_code: false
  explanation:
  - tri-state bus 같은 다중 드라이버 신호는 반드시 wire(net) 타입으로 선언해야 한다.
  - net 타입만 resolution function을 통해 여러 드라이버의 값을 결합(resolve)할 수 있다.
  - logic, bit, reg 등 variable 타입은 모두 단일 드라이버만 허용하므로 다중 드라이버 환경에서 사용할 수 없다.
  created: '2026-03-01'
- id: svbasic_02_017
  section: '2.10'
  section_title: 여러 프로시저의 변수 할당 제약
  question: always_comb 블록의 특징으로 올바른 것은?
  choices:
  - 여러 always_comb에서 같은 변수에 할당 가능
  - 변수에 대해 단일 구동자만 허용
  - nonblocking 할당만 사용 가능
  - clock edge에서만 동작
  answer: 2
  difficulty: 중
  has_code: false
  explanation:
  - always_comb은 조합 논리 전용 블록으로, 하나의 변수에 대해 단일 프로시저만 할당을 허용한다.
  - 여러 always_comb 블록에서 같은 변수에 할당하면 다중 드라이버 에러가 발생한다.
  - 이 제약은 Verilog의 always @(\*)에서는 없었던 것으로, SystemVerilog가 설계 의도를 더 엄격히 검증하도록 강화한
    규칙이다.
  created: '2026-03-01'
- id: svbasic_02_018
  section: '2.10'
  section_title: 여러 프로시저의 변수 할당 제약
  question: Verilog의 always @(\*)와 SystemVerilog의 always_comb의 차이점은?
  choices:
  - 기능이 완전히 동일함
  - always_comb은 같은 변수에 다중 프로시저 할당을 금지함
  - always @(\*)는 합성이 불가능함
  - always_comb은 순차 논리에만 사용
  answer: 2
  difficulty: 중
  has_code: false
  explanation:
  - Verilog의 always @(\*)는 여러 블록에서 같은 변수에 할당해도 컴파일 에러가 발생하지 않아 다중 드라이버 문제를 사전에 잡기
    어려웠다.
  - SystemVerilog의 always_comb은 하나의 변수에 하나의 블록만 할당을 허용하여 설계 의도를 명확히 한다.
  - 또한 always_comb은 시뮬레이션 시작 시 자동으로 한 번 실행되어 초기값 문제도 해결한다.
  created: '2026-03-01'
- id: svbasic_02_019
  section: '2.11'
  section_title: 비지정 리터럴
  question: SystemVerilog에서 '1을 logic [5:0] 변수에 할당하면 결과는?
  choices:
  - '000001'
  - '111111'
  - '100000'
  - 컴파일 에러
  answer: 2
  difficulty: 중
  has_code: false
  has_image: true
  image:
    path: "./images/class02_2_12_sv.drawio.svg"
    w: 400
    layout: side
  image_alt: "SystemVerilog 비지정 리터럴('1)의 전체 비트 채움 동작 다이어그램"
  explanation:
  - SystemVerilog의 비지정 리터럴(unsized literal) '1은 대상 변수의 전체 비트를 지정한 값으로 채운다.
  - 6비트 변수에 '1을 할당하면 모든 비트가 1로 채워져 6'b111111(= 6'h3F)이 된다.
  - '마찬가지로 ''0은 전체 0, ''x는 전체 X, ''z는 전체 Z로 채워진다. Verilog의 크기 지정 리터럴(예: 6''b1 = 000001)과
    혼동하지 않도록 주의해야 한다.'
  created: '2026-03-01'
- id: svbasic_02_020
  section: '2.11'
  section_title: 비지정 리터럴
  question: Verilog에서 6'b1을 6비트 변수에 할당하면 결과는?
  choices:
  - '111111'
  - '000001'
  - '100000'
  - '000000'
  answer: 2
  difficulty: 중
  has_code: false
  explanation:
  - Verilog의 크기 지정 리터럴 6'b1은 최하위 비트(LSB)만 1이고 나머지 상위 비트는 0으로 패딩되어 6'b000001이 된다.
  - 이는 SystemVerilog의 비지정 리터럴 '1(전체 비트를 1로 채움)과 동작이 완전히 다르다.
  - 전체 비트를 1로 만들려면 Verilog에서는 6'b111111 또는 6'h3F처럼 명시적으로 작성하거나, SystemVerilog의 '1을
    사용해야 한다.
  created: '2026-03-01'
- id: svbasic_02_021
  section: '2.12'
  section_title: Time Literal
  question: Time literal의 올바른 표기 형식은?
  choices:
  - 10 ns (공백 있음)
  - 10ns (공백 없음)
  - ns10 (단위가 앞)
  - 10_ns (언더스코어)
  answer: 2
  difficulty: 하
  has_code: false
  explanation:
  - 'SystemVerilog의 time literal은 숫자와 시간 단위 사이에 공백 없이 붙여 써야 한다(예: 10ns, 3.14ps, 1us).'
  - 사용 가능한 시간 단위는 s, ms, us, ns, ps, fs이다.
  - 공백을 넣거나(10 ns), 단위를 앞에 쓰거나(ns10), 언더스코어를 넣으면(10_ns) 문법 에러가 발생한다.
  created: '2026-03-01'
- id: svbasic_02_022
  section: '2.12'
  section_title: Time Literal
  question: 1step의 의미는?
  choices:
  - 1 나노초
  - 1 클록 사이클
  - 하나의 simulation precision unit
  - 1 피코초
  answer: 3
  difficulty: 중
  has_code: false
  explanation:
  - 1step은 현재 timeprecision으로 설정된 최소 시간 단위 하나를 의미하는 특수 time literal이다.
  - 예를 들어 timeprecision이 100ps이면 1step = 100ps, 1ns이면 1step = 1ns가 된다.
  - 주로 클록 에지 직전에 신호를 샘플링하는 용도로 사용되며, 시뮬레이션 정밀도에 자동으로 맞춰지는 장점이 있다.
  created: '2026-03-01'
- id: svbasic_02_023
  section: '2.13'
  section_title: time literal 코드 예제
  question: '\`timescale 1ns/100ps 에서 #2.32ns의 실제 적용 지연 시간은?'
  choices:
  - 2.32ns
  - 2.3ns (precision에 맞게 반올림)
  - 2ns (내림)
  - 3ns (올림)
  answer: 2
  difficulty: 상
  has_code: false
  explanation:
  - \`timescale 1ns/100ps에서 time unit은 1ns, precision은 100ps(= 0.1ns)이다.
  - '#2.32ns는 precision 단위(0.1ns)로 반올림되어 2.3ns가 실제 적용된다.'
  - 시뮬레이터는 precision보다 더 세밀한 시간을 표현할 수 없으므로, 0.02ns 부분이 반올림으로 제거된다.
  created: '2026-03-01'
- id: svbasic_02_024
  section: '2.13'
  section_title: time literal 코드 예제
  question: '다음 코드에서 1step의 지연 시간은? (timeprecision 100ps) `clk= #1step ~clk;`'
  choices:
  - 1ns
  - 100ps
  - 10ps
  - 1ps
  answer: 2
  difficulty: 중
  has_code: false
  explanation:
  - timeprecision이 100ps로 설정되어 있으므로 1step = 100ps이다.
  - 1step은 현재 설정된 simulation precision unit 하나를 의미하며, timeprecision 값에 따라 달라진다.
  - 이 코드에서 clk는 100ps 후에 반전되며, 이는 시뮬레이션에서 표현 가능한 최소 시간 단위의 지연을 사용하는 패턴이다.
  created: '2026-03-01'
- id: svbasic_02_025
  section: '2.14'
  section_title: timeunit 과 timeprecision
  question: timeunit과 \`timescale의 가장 큰 차이점은?
  choices:
  - 기능 자체가 다름
  - timeunit은 컴파일 순서 의존성이 없음
  - \`timescale이 더 정확함
  - timeunit은 모듈 밖에서 선언함
  answer: 2
  difficulty: 중
  has_code: false
  explanation:
  - \`timescale은 컴파일러 지시자(compiler directive)로 파일 컴파일 순서에 따라 영향 범위가 달라지는 문제가 있다.
  - timeunit/timeprecision은 모듈 내부에 선언하므로 해당 모듈에만 적용되어 파일 순서에 의존하지 않는다.
  - SystemVerilog에서는 timeunit/timeprecision 사용이 권장되며, 대규모 프로젝트에서 예측 불가능한 timescale
    상속 문제를 방지할 수 있다.
  created: '2026-03-01'
- id: svbasic_02_026
  section: '2.14'
  section_title: timeunit 과 timeprecision
  question: Time unit resolution에서 가장 높은 우선순위를 가지는 것은?
  choices:
  - Simulator default
  - \`timescale in compile unit
  - timeunit (inside module)
  - Inherited from parent module
  answer: 3
  difficulty: 중
  has_code: false
  has_image: true
  image:
    path: "./images/class02_2_15.drawio.svg"
    w: 400
    layout: side
  image_alt: "Time unit resolution 우선순위 계층 다이어그램"
  explanation:
  - Time unit resolution에서 모듈 내부의 timeunit 선언이 가장 높은 우선순위를 가진다.
  - '우선순위 순서는: timeunit(모듈 내부) > 상위 모듈 상속 > 컴파일 유닛의 \`timescale > 시뮬레이터 기본값이다.'
  - 따라서 모듈 내부에 timeunit을 명시하면 외부 설정에 관계없이 해당 모듈의 시간 단위가 보장된다.
  created: '2026-03-01'
