- id: svbasic_03_025
  section: '3.14'
  section_title: Verilog 사용하여 합성 가능한 하드웨어 요소 모델링
  question: Verilog always 블록에서 합성 결과를 결정하는 요인은?
  choices:
  - 모듈 이름
  - sensitivity list와 코딩 스타일
  - 변수의 데이터 타입
  - 파일 이름
  answer: 2
  difficulty: 하
  has_code: false
  has_image: true
  image: "./images/class03_3_14.drawio.svg"
  image_alt: "3.14 Verilog 사용하여, 합성 가능한 하드웨어 요소 모델링"
  explanation:
  - Verilog의 always 블록은 조합 논리, 래치, 순차 논리를 모두 모델링할 수 있으며, 합성 결과는 sensitivity list와 작성 스타일에 따라 결정된다.
  - 시뮬레이터는 사용자의 의도를 전혀 알 수 없기 때문에, 동일한 always 블록이 의도와 다르게 해석될 수 있다.
  - SystemVerilog는 이러한 애매함을 줄이기 위해 always_comb, always_latch, always_ff 키워드를 제공한다.
  created: '2026-03-02'
- id: svbasic_03_026
  section: '3.14'
  section_title: Verilog 사용하여 합성 가능한 하드웨어 요소 모델링
  question: Verilog always 블록의 한계점은?
  choices:
  - 조합 논리만 모델링 가능하다
  - 설계 의도를 시뮬레이터가 정확히 해석하지 못할 수 있다
  - 합성이 불가능하다
  - sensitivity list가 자동 생성된다
  answer: 2
  difficulty: 중
  has_code: false
  has_image: false
  explanation:
  - always 블록 하나로 조합 논리, 래치, 순차 논리를 모두 표현할 수 있지만, 어떤 하드웨어로 의도한 것인지 시뮬레이터가 정확히 해석하지 못할 수 있다.
  - 예를 들어 always @(a or b or sel)이라고 작성했지만, 의도는 latch일 수도 있고 mux일 수도 있다.
  - SystemVerilog의 always_comb, always_latch, always_ff를 사용하면 의도를 명확히 드러낼 수 있다.
  created: '2026-03-02'
- id: svbasic_03_027
