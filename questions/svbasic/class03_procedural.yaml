- id: svbasic_03_001
  section: '3.2'
  section_title: block end에 반복되는 block identifier 사용
  question: SystemVerilog에서 블록 끝에 이름을 반복 명시하는 기능의 주된 목적은?
  choices:
  - 컴파일 속도 향상
  - 복잡한 중첩 블록에서 가독성 향상
  - 합성 결과 최적화
  - 시뮬레이션 속도 향상
  answer: 2
  difficulty: 하
  has_code: false
  has_image: true
  image: "./images/class03_3_2.drawio.svg"
  image_alt: "3.2 block end에 반복되는 block identifier 사용"
  explanation:
  - 복잡한 중첩 블록에서 어떤 블록이 어디서 끝나는지를 명확히 해주어, 유지보수와 디버깅 측면에서 매우 효과적이다.
  - 이 기능은 Verilog-1995에서는 지원되지 않았으며, SystemVerilog에서 새로 도입되었다.
  - module, function, task, fork, interface 등 다양한 코드 블록에 모두 적용 가능하다.
  created: '2026-03-02'
- id: svbasic_03_002
  section: '3.2'
  section_title: block end에 반복되는 block identifier 사용
  question: 다음 중 SystemVerilog에서 블록 끝에 이름을 반복할 수 있는 구문이 아닌 것은?
  choices:
  - module ... endmodule
  - begin ... end
  - assign 문
  - fork ... join
  answer: 3
  difficulty: 중
  has_code: false
  has_image: false
  explanation:
  - 블록 이름 반복은 module, begin...end, task, function, fork...join, primitive, interface 등 블록 구문에만 적용된다.
  - assign 문은 단일 문장이지 블록 구문이 아니므로, 시작과 끝을 명시하는 이름 반복이 적용되지 않는다.
  - 다만 label을 통해 단일 statement에도 이름을 지정할 수 있어 disable 문이나 jump control에서 활용 가능하다.
  created: '2026-03-02'
- id: svbasic_03_003
  section: '3.3'
  section_title: unnamed block에서 block item 선언
  question: SystemVerilog에서 이름 없는 블록 내 지역 변수에 대한 설명으로 올바른 것은?
  choices:
  - 이름 없는 블록에서는 변수 선언이 불가능하다
  - 선언된 블록과 하위 블록에서만 유효하다
  - 모듈 전체에서 접근 가능하다
  - 계층적 참조(hierarchical reference)가 가능하다
  answer: 2
  difficulty: 하
  has_code: false
  has_image: true
  image: "./images/class03_3_3.drawio.svg"
  image_alt: "3.3 unnamed block에서 block item 선언"
  explanation:
  - SystemVerilog에서는 이름 없는 블록 내에서도 자유롭게 지역 변수를 선언할 수 있다.
  - 이러한 변수들은 해당 블록과 그 하위 블록에서 유효하게 사용될 수 있다.
  - 블록에 이름이 없기 때문에 외부에서 이 변수에 대해 계층적 참조(hierarchical reference)는 불가능하다.
  created: '2026-03-02'
- id: svbasic_03_004
  section: '3.3'
  section_title: unnamed block에서 block item 선언
  question: Verilog-2001에서 블록 내 지역 변수를 선언하려면 반드시 필요한 것은?
  choices:
  - var 키워드
  - 블록 이름 (begin : name)
  - static 키워드
  - module 선언
  answer: 2
  difficulty: 하
  has_code: false
  has_image: false
  explanation:
  - Verilog-1995에서는 블록 안에서 지역 변수를 선언하는 것이 허용되지 않았다.
  - Verilog-2001부터는 가능해졌지만, 반드시 블록에 이름이 있어야만 지역 변수 선언이 허용되었다.
  - SystemVerilog에서는 이 제약이 제거되어 이름 없는 블록에서도 지역 변수 선언이 가능하다.
  created: '2026-03-02'
- id: svbasic_03_005
  section: '3.4'
  section_title: for 문 내 변수 선언
  question: SystemVerilog에서 for 문 내부에 루프 변수를 선언하는 주요 이점은?
  choices:
  - 컴파일 속도가 빨라진다
  - 루프 간 변수 충돌을 방지한다
  - 합성 가능성이 높아진다
  - 4-state 값을 지원한다
  answer: 2
  difficulty: 하
  has_code: false
  has_image: true
  image: "./images/class03_3_4.drawio.svg"
  image_alt: "3.4 for 문 내 변수 선언"
  explanation:
  - 각 루프 안에 독립적으로 변수를 선언하면, 해당 루프 범위(scope) 내에서만 변수가 유효하므로 변수 간 충돌이 발생하지 않는다.
  - 기존 Verilog에서는 루프 밖에서 integer i;를 선언한 후 여러 루프에서 동일한 i를 공유했기 때문에 의도치 않은 값 충돌이 발생할 수 있었다.
  - 이 방식은 루프마다 서로 다른 초기화 값이나 증가 조건을 안전하게 설정할 수 있어 코드의 가독성과 안정성을 높여준다.
  created: '2026-03-02'
- id: svbasic_03_006
  section: '3.4'
  section_title: for 문 내 변수 선언
  question: Verilog에서 여러 for 문이 같은 루프 변수 i를 공유할 때 발생할 수 있는 문제는?
  choices:
  - 컴파일 에러 발생
  - 의도치 않은 값 충돌
  - 시뮬레이션 중단
  - 합성 불가
  answer: 2
  difficulty: 중
  has_code: false
  has_image: false
  explanation:
  - 기존 Verilog에서는 루프 밖에서 선언한 변수를 여러 루프에서 공유하므로, 루프가 중첩되거나 동시에 사용될 경우 의도치 않은 값 충돌이 발생할 수 있었다.
  - SystemVerilog에서는 for 문 내에 int i=0;처럼 변수를 선언하면 해당 루프 scope 내에서만 유효하여 충돌을 방지한다.
  - int는 2-state 타입이기 때문에 루프 변수처럼 X/Z 값이 불필요한 용도에 적합하다.
  created: '2026-03-02'
- id: svbasic_03_007
  section: '3.5'
  section_title: foreach 반복문
  question: foreach 반복문의 반복 변수에 대한 설명으로 올바른 것은?
  choices:
  - 별도 선언이 필요하다
  - 자동 선언되며 읽기 전용이다
  - 값 변경이 가능하다
  - 루프 외부에서 접근 가능하다
  answer: 2
  difficulty: 하
  has_code: false
  has_image: true
  image: "./images/class03_3_5.drawio.svg"
  image_alt: "3.5 foreach 반복문"
  explanation:
  - foreach 반복문에서 사용하는 반복 변수는 자동으로 선언되며, 해당 반복문 내부에서만 사용할 수 있다.
  - 이 변수는 읽기 전용이며, 값을 변경할 수는 없다.
  - for문처럼 반복 변수를 따로 선언할 필요가 없어 코드가 훨씬 간결하다.
  created: '2026-03-02'
- id: svbasic_03_008
  section: '3.5'
  section_title: foreach 반복문
  question: 2차원 배열에 foreach를 사용할 때 동작 방식은?
  choices:
  - 첫 번째 차원만 순회한다
  - 마지막 차원만 순회한다
  - 중첩 루프처럼 동작한다
  - 컴파일 에러가 발생한다
  answer: 3
  difficulty: 중
  has_code: false
  has_image: false
  explanation:
  - 배열이 다차원인 경우 각 차원마다 반복 변수를 따로 선언할 수 있으며, 이때 foreach는 중첩 루프처럼 동작한다.
  - 예를 들어 foreach (arr2d[k, l]) 구문은 for (k=...)와 for (l=...)의 중첩 구조와 동일한 역할을 한다.
  - 차원이 높을수록 안쪽 인덱스가 더 빠르게 변화하며, 배열의 모든 요소에 대해 초기화나 반복 연산을 수행할 때 매우 유용하다.
  created: '2026-03-02'
- id: svbasic_03_009
  section: '3.6'
  section_title: do...while 반복문
  question: do...while 반복문과 while 반복문의 가장 큰 차이점은?
  choices:
  - 사용 가능한 연산자가 다르다
  - do...while은 최소 한 번 실행이 보장된다
  - while이 더 빠르다
  - do...while은 합성이 불가능하다
  answer: 2
  difficulty: 하
  has_code: false
  has_image: true
  image: "./images/class03_3_6.drawio.svg"
  image_alt: "3.6 do...while 반복문"
  explanation:
  - while 반복문은 조건을 먼저 평가하므로, 조건이 처음부터 거짓이면 한 번도 실행되지 않는다.
  - do...while은 먼저 문장을 실행한 후 조건을 검사하므로, 조건이 거짓이더라도 최소 한 번은 실행된다.
  - do...while은 초기화 또는 입력 처리와 같이 최소 한 번 실행이 필요한 로직을 작성할 때 유용하다.
  created: '2026-03-02'
- id: svbasic_03_010
  section: '3.6'
  section_title: do...while 반복문
  question: do...while에서 조건이 처음부터 거짓일 때 블록 내 문장은 몇 번 실행되는가?
  choices:
  - 0번
  - 1번
  - 2번
  - 무한 반복
  answer: 2
  difficulty: 중
  has_code: false
  has_image: false
  explanation:
  - do...while은 먼저 문장을 실행한 후 조건을 검사하므로, 조건이 거짓이더라도 블록 내 문장이 최소 한 번은 실행된다.
  - 반면 일반 while에서는 조건이 처음부터 거짓이면 블록이 한 번도 실행되지 않는다.
  - 이 특성은 조건과 무관하게 초기 동작이 필요한 경우에 유용하게 활용된다.
  created: '2026-03-02'
- id: svbasic_03_011
  section: '3.7'
  section_title: break, continue
  question: SystemVerilog에서 break 문의 동작은?
  choices:
  - 모듈을 종료한다
  - 현재 루프를 즉시 종료한다
  - 다음 반복으로 이동한다
  - 시뮬레이션을 종료한다
  answer: 2
  difficulty: 하
  has_code: false
  has_image: true
  image: "./images/class03_3_7.drawio.svg"
  image_alt: "3.7 break, continue"
  explanation:
  - break는 현재 루프를 종료시키며, 루프의 끝으로 강제로 이동시킨다.
  - break와 continue 문은 오직 루프문(do, for, foreach, repeat, while) 내부에서만 사용할 수 있다.
  - Verilog의 disable 문이나 복잡한 분기문보다 코드의 가독성이 향상된다.
  created: '2026-03-02'
- id: svbasic_03_012
  section: '3.7'
  section_title: break, continue
  question: SystemVerilog에서 continue 문의 동작은?
  choices:
  - 루프를 종료한다
  - 현재 반복의 나머지를 건너뛰고 다음 반복으로 이동한다
  - 시뮬레이션을 일시정지한다
  - 블록을 재시작한다
  answer: 2
  difficulty: 하
  has_code: false
  has_image: false
  explanation:
  - continue는 루프의 다음 반복을 시작하게 하며, 루프의 처음으로 강제로 이동시킨다.
  - 일반적으로 조건문과 함께 사용되어, 특정 조건에서 이후 연산을 건너뛰는 용도로 활용된다.
  - break와 마찬가지로 do, for, foreach, repeat, while 루프 내부에서만 사용할 수 있다.
  created: '2026-03-02'
- id: svbasic_03_013
  section: '3.8'
  section_title: case 문을 위한 특별 합성 지시문
  question: parallel_case 합성 지시문의 역할은?
  choices:
  - case 문의 시뮬레이션 속도를 높인다
  - 불필요한 우선순위 논리를 제거하도록 합성 도구에 지시한다
  - 래치 생성을 방지한다
  - 시뮬레이션 경고를 억제한다
  answer: 2
  difficulty: 중
  has_code: false
  has_image: true
  image: "./images/class03_3_8.drawio.svg"
  image_alt: "3.8 case 문을 위한 특별 합성 지시문"
  explanation:
  - parallel_case는 모든 case 항목이 동시에 평가될 수 있고 서로 중복되지 않는다는 것을 합성 도구에 알려 우선순위 논리를 제거한다.
  - 하지만 실제 설계에서 이 가정이 깨지면 시뮬레이션과 합성 결과가 달라지는 심각한 문제를 초래할 수 있다.
  - 따라서 일반적으로는 권장되지 않으며, SystemVerilog의 unique case로 대체하는 것이 바람직하다.
  created: '2026-03-02'
- id: svbasic_03_014
  section: '3.8'
  section_title: case 문을 위한 특별 합성 지시문
  question: full_case 합성 지시문에 default 항목을 추가하면 어떻게 되는가?
  choices:
  - 합성 결과가 최적화된다
  - full_case의 효과가 무효화된다
  - 컴파일 에러가 발생한다
  - 시뮬레이션 속도가 빨라진다
  answer: 2
  difficulty: 중
  has_code: false
  has_image: false
  explanation:
  - full_case는 모든 가능한 값이 커버되었다고 합성기에 알려 latch 생성을 피하기 위한 것이다.
  - default가 포함되면 사실상 모든 경우가 이미 커버되므로 full_case는 의미를 잃게 된다.
  - full_case를 넣기보다는 default 항목을 명확히 작성하는 것이 더 안전하고 바람직하다.
  created: '2026-03-02'
- id: svbasic_03_015
  section: '3.9'
  section_title: SystemVerilog priority case
  question: priority case의 합성 시 의미는?
  choices:
  - parallel_case 속성과 동일
  - full_case 속성과 동일
  - full_case와 parallel_case 모두
  - 합성에 영향 없음
  answer: 2
  difficulty: 중
  has_code: false
  has_image: true
  image: "./images/class03_3_9.drawio.svg"
  image_alt: "3.9 SystemVerilog priority case"
  explanation:
  - priority case는 합성 시 full_case 속성과 동일한 의미로 처리되어, 모든 경우가 커버되었음을 합성기에 알린다.
  - 시뮬레이션 시에는 어떤 case 항목도 일치하지 않으면 런타임 경고가 발생한다.
  - priority case에서는 분기 항목 간 중복이 허용되며, 첫 번째로 일치하는 분기가 실행된다.
  created: '2026-03-02'
- id: svbasic_03_016
  section: '3.9'
  section_title: SystemVerilog priority case
  question: priority case에서 분기 항목 간 중복이 있을 때 동작은?
  choices:
  - 컴파일 에러가 발생한다
  - 첫 번째로 일치하는 분기만 실행된다
  - 모든 일치 분기가 실행된다
  - 런타임 경고가 발생한다
  answer: 2
  difficulty: 중
  has_code: false
  has_image: false
  explanation:
  - priority case는 분기 항목 간 중복을 허용하며, 위에서 아래로 순차적으로 비교하여 첫 번째로 일치하는 분기만 실행한다.
  - 이는 우선순위 인코더의 논리와 유사하게 동작한다.
  - 반면 unique case는 중복 분기가 있으면 런타임 경고를 발생시킨다는 점에서 차이가 있다.
  created: '2026-03-02'
- id: svbasic_03_017
  section: '3.10'
  section_title: SystemVerilog unique case
  question: unique case의 합성 시 의미는?
  choices:
  - full_case만
  - parallel_case만
  - full_case와 parallel_case 모두
  - 합성에 영향 없음
  answer: 3
  difficulty: 중
  has_code: false
  has_image: true
  image: "./images/class03_3_10.drawio.svg"
  image_alt: "3.10 SystemVerilog unique case"
  explanation:
  - unique case는 합성기에게 full_case와 parallel_case 속성을 동시에 사용하는 것과 동일한 의미를 전달한다.
  - 즉, 모든 입력 값에 대해 반드시 하나의 분기가 매칭되어야 하고, 동시에 여러 분기가 매칭되면 안 된다.
  - 시뮬레이터에서는 이 두 조건을 런타임에 검증하여 위반 시 경고를 발생시킨다.
