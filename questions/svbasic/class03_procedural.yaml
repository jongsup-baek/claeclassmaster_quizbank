  - 반면 검증 환경에서는 특정 조건에서만 트리거되는 스티뮬러스 코드를 깔끔하게 작성할 수 있어 매우 유용하다.
  - 예를 들어 @(negedge clk iff !s_wait)처럼 대기 조건이 해제될 때만 데이터를 전송하는 패턴에 활용된다.
