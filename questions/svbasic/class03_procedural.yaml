  - unconditional else를 추가하면 모든 입력 조건에 대해 로직이 정의되어 경고 없이 안정적인 동작을 기대할 수 있다.
  - else 문이 없더라도 최소한 null statement(else ;)를 통해 분기 구조를 완결해주는 것이 좋다.
