  choices:
  - sensitivity list를 명시해야 한다
  - 암시적으로 완전한 sensitivity list를 생성한다
  - 타이밍 제어를 포함할 수 있다
  - 여러 블록에서 같은 변수에 할당 가능하다
  answer: 2
  difficulty: 하
