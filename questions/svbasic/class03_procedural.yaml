  - 도구들은 always_comb 안의 코드가 조합 논리를 유도하지 못할 경우 경고를 발생시킨다.
  - 반드시 모든 경로에서 출력이 할당되도록 작성해야 한다.
  created: '2026-03-02'
- id: svbasic_03_029
  section: '3.16'
  section_title: always @*와 always_comb 비교
  question: always_comb이 always @*보다 더 완전한 sensitivity list를 생성하는 이유는?
  choices:
  - 더 많은 변수를 선언할 수 있으므로
  - 호출된 함수 내부의 변수까지 포함하므로
  - 합성 도구가 자동으로 추가하므로
  - 4-state 변수만 포함하므로
  answer: 2
  difficulty: 중
  has_code: false
  has_image: true
  image: "./images/class03_3_16.drawio.svg"
  image_alt: "3.16 always @*와 always_comb 비교"
  explanation:
  - always @*는 함수 호출 시 인자(argument)로 들어간 변수들만 sensitivity list에 포함하고, 함수 내부에서 side effect로 읽히는 변수는 포함하지 않는다.
  - always_comb은 호출된 함수에서 side effect로 읽히는 변수들까지 포함하여 sensitivity list를 완전하게 구성한다.
  - 이러한 이유로 always_comb은 조합 논리를 명확하고 안전하게 설계하기 위한 최선의 선택이다.
  created: '2026-03-02'
- id: svbasic_03_030
  section: '3.16'
  section_title: always @*와 always_comb 비교
  question: always @*에서 함수를 호출할 때 sensitivity list에 포함되지 않는 것은?
  choices:
  - 함수의 인자(argument)로 전달된 변수
  - 함수 내부에서 side effect로 읽히는 변수
  - 블록 내에서 직접 읽는 변수
  - if 조건에 사용된 변수
  answer: 2
  difficulty: 상
  has_code: false
  has_image: false
  explanation:
  - always @*는 블록 내에서 읽히는 변수들을 암시적으로 sensitivity list에 넣어주지만, 함수의 인자로 들어간 변수만 포함한다.
  - 함수 안에서 side effect로 읽히는 변수들은 sensitivity list에 포함되지 않아 의도와 다르게 작동할 수 있다.
  - always_comb은 이 한계를 해결하여 함수 내부의 모든 입력 변화에 반응한다.
  created: '2026-03-02'
