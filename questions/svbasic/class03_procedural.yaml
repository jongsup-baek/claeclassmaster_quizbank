  image_alt: "3.15 always_comb으로 combinational block"
  explanation:
  - always_comb은 sensitivity list를 명시하지 않아도 자동으로 읽히는 모든 변수에 대해 완전한 sensitivity list를 생성한다.
  - always_comb 블록 안에서 사용된 출력 변수는 다른 procedural block에서 절대 할당할 수 없다.
  - 또한 타이밍 제어(#, @)나 이벤트 제어를 포함할 수 없다.
