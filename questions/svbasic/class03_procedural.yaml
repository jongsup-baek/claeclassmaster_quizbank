  question: iff qualifier의 동작으로 올바른 것은?
  choices:
  - 모든 신호 변화에 트리거된다
  - 조건이 참일 때만 이벤트를 감지한다
  - 조건이 거짓일 때만 이벤트를 감지한다
  - 조건 신호의 변화에도 트리거된다
  answer: 2
