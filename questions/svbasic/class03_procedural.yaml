  has_code: false
  has_image: true
  image: "./images/class03_3_13.drawio.svg"
  image_alt: "3.13 iff qualifier 이용한 조건부 이벤트 제어"
  explanation:
  - iff는 "if and only if"를 의미하며, 특정 조건이 참일 때에만 이벤트 감지가 유효하도록 만든다.
  - 예를 들어 @(a iff enable == 1)은 a가 변할 때 enable == 1 조건이 만족될 때에만 블록이 실행된다.
  - enable 신호의 변화 자체로는 트리거되지 않으며, 반드시 a의 변화가 있어야 조건 평가가 이루어진다.
  created: '2026-03-02'
- id: svbasic_03_024
  section: '3.13'
  section_title: iff qualifier 이용한 조건부 이벤트 제어
