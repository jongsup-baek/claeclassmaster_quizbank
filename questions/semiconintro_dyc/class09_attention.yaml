- id: semiconintro_dyc_09_004
  section: "9.1"
  section_title: "트랜스포머"
  type: fill_blank
  question: "인코더는 입력 문장의 전체 (___) 를 요약하고, 디코더는 이를 참고해 (___) 를 생성한다."
  answer: "의미 / 단어"
  difficulty: 중
  has_code: false
  has_image: false
  explanation:
    - "인코더는 입력 문장의 전체 의미를 벡터로 요약(인코딩)한다"
    - "디코더는 인코더의 출력을 참고하면서 한 단어씩 결과를 생성(디코딩)한다"
    - "번역의 경우, 인코더가 원문의 의미를 파악하고 디코더가 번역문을 단어 단위로 생성한다"
  created: 2026-03-02
