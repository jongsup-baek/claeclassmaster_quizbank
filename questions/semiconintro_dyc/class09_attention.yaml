  section_title: "어텐션 메커니즘"
  type: mc
  question: "어텐션 메커니즘의 핵심은?"
  choices:
    - "모든 단어를 동일하게 처리"
    - "중요 단어에 집중"
    - "순서대로 처리"
    - "단어를 무작위로 선택"
  answer: 2
  difficulty: 하
  has_code: false
  has_image: false
  explanation:
    - "어텐션은 입력 시퀀스에서 현재 처리 중인 부분과 관련성이 높은 단어에 더 높은 가중치를 부여한다"
    - "이를 통해 문맥을 더 정확하게 파악하고, 긴 문장에서도 핵심 정보를 놓치지 않는다"
    - "기존 RNN 방식은 순서대로 처리하여 긴 문장에서 정보 손실이 발생했다"
  created: 2026-03-02

- id: semiconintro_dyc_09_003
  section: "9.2"
  section_title: "어텐션 메커니즘"
  type: fill_blank
  question: "어텐션은 단어 간 (___) 를 계산하고, 중요한 단어에 (___) 한다."
  answer: "관계 / 집중"
  difficulty: 중
  has_code: false
  has_image: false
  explanation:
    - "어텐션 메커니즘은 Query, Key, Value를 사용하여 단어 간 관계(유사도)를 계산한다"
    - "유사도가 높은 단어에 더 높은 가중치(집중)를 부여하여 문맥을 반영한다"
    - "이 과정이 행렬곱으로 이루어지므로 GPU의 병렬 처리와 잘 맞는다"
