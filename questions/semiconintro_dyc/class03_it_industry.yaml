    - "마이크로프로세서"
    - "인공지능"
  answer: 3
  difficulty: 하
  has_code: false
  has_image: false
  explanation:
    - "1971년 인텔이 세계 최초의 상용 마이크로프로세서 4004를 출시했다"
    - "CPU 전체를 하나의 칩에 담을 수 있게 되면서 개인용 컴퓨터(PC)가 등장했다"
    - "이후 인터넷, 스마트폰으로 이어지는 디지털 혁명이 가속화되었다"
