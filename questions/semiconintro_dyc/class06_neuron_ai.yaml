- id: semiconintro_dyc_06_001
  section: "6.1"
  section_title: "뉴런 구조와 신호 전달"
  question: "뉴런의 신호 전달 경로 순서는?"
  choices:
    - "축삭→가지돌기→세포체→시냅스"
    - "세포체→축삭→가지돌기→시냅스"
    - "가지돌기→세포체→축삭→시냅스"
    - "시냅스→축삭→세포체→가지돌기"
  answer: 3
  difficulty: 중
  has_code: false
  has_image: false
  explanation:
    - "가지돌기(수상돌기)가 다른 뉴런의 신호를 수신한다"
    - "세포체에서 신호를 통합·처리하고, 축삭을 통해 다음 뉴런으로 전달한다"
    - "시냅스는 뉴런 간 연결 지점으로, 신경전달물질을 통해 신호를 전달한다"
  created: 2026-03-02

- id: semiconintro_dyc_06_002
  section: "6.2"
  section_title: "행렬곱과 AI 연산"
  question: "뉴런의 연산이 수학적으로 표현되는 방식은?"
  choices:
    - "미분"
    - "적분"
    - "행렬곱"
    - "로그함수"
  answer: 3
  difficulty: 중
  has_code: false
  has_image: false
  explanation:
    - "뉴런의 입력값에 가중치를 곱하고 합산하는 과정이 행렬곱으로 표현된다"
    - "Σ(wᵢ·xᵢ) + b 형태의 연산이 신경망의 기본 단위이다"
    - "GPU, TPU가 이 행렬곱을 수천 개 코어로 병렬 처리하여 AI 연산을 가속한다"
  created: 2026-03-02

- id: semiconintro_dyc_06_003
  section: "6.1"
  section_title: "뉴런 구조와 신호 전달"
  question: "인간의 뇌에는 약 1000억개의 (___) 과 100조개의 시냅스가 있다."
  choices:
    - "축삭"
    - "뉴런"
    - "가지돌기"
    - "세포체"
  answer: 2
  difficulty: 하
  has_code: false
  has_image: false
  explanation:
    - "인간의 뇌에는 약 1000억(10^11)개의 뉴런이 있다"
    - "각 뉴런은 평균 1000개의 시냅스로 다른 뉴런과 연결되어 총 약 100조(10^14)개의 시냅스를 형성한다"
    - "인공 신경망은 이 구조를 수학적으로 모방한 것이다"
  created: 2026-03-02

- id: semiconintro_dyc_06_004
  section: "6.3"
  section_title: "GPU와 CUDA"
  question: "GPU, NPU, TPU는 모두 (___) 연산을 (___) 수행해 AI를 가속한다."
  choices:
    - "미분 / 순차"
    - "행렬곱 / 병렬"
    - "논리 / 직렬"
    - "정렬 / 분산"
  answer: 2
  difficulty: 중
  has_code: false
  has_image: false
  explanation:
    - "AI 연산의 핵심은 행렬곱이며, 이를 병렬로 처리하면 속도가 비약적으로 향상된다"
    - "GPU는 수천 개 코어, TPU는 텐서 코어, NPU는 신경망 전용 코어로 행렬곱을 병렬 처리한다"
    - "CPU는 복잡한 작업을 순차적으로 처리하는 데 강하지만, AI의 대규모 병렬 연산에는 적합하지 않다"
  created: 2026-03-02
